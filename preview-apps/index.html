<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM AI Platform - 版本预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 50px;
      color: white;
    }
    .header h1 {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }
    .header p {
      font-size: 16px;
      opacity: 0.9;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .card-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-latest { background: #dcfce7; color: #166534; }
    .badge-alt { background: #e0e7ff; color: #3730a3; }
    .badge-vibe { background: #fef3c7; color: #92400e; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #22c55e;
      margin-top: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 PM AI Platform</h1>
      <p>产品智能工作台 - 版本预览导航</p>
    </div>

    <div class="cards">
      <!-- 主版本 -->
      <a href="http://localhost:5173" target="_blank" class="card">
        <div class="card-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
          ⭐
        </div>
        <div class="card-title">SDD 主版本</div>
        <div class="card-desc">
          最新优化版本，包含三栏详情页布局、CHATBOT AI 助手、历史需求参考等完整功能
        </div>
        <span class="card-badge badge-latest">最新版本</span>
        <div class="status"><span class="status-dot"></span> 运行中 - 端口 5173</div>
      </a>

      <!-- 备份版本 -->
      <a href="http://localhost:5174" target="_blank" class="card">
        <div class="card-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
          📦
        </div>
        <div class="card-title">SDD 备份版本</div>
        <div class="card-desc">
          备份版本，可能包含不同的功能实现或布局方式，用于对比和回退
        </div>
        <span class="card-badge badge-alt">备用版本</span>
        <div class="status" style="color: #f59e0b;"><span class="status-dot" style="background: #f59e0b;"></span> 未运行 - 端口 5174</div>
      </a>

      <!-- Vibe 版本 -->
      <a href="http://localhost:5175" target="_blank" class="card">
        <div class="card-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
          🎨
        </div>
        <div class="card-title">Vibe 设计版</div>
        <div class="card-desc">
          Vibe 设计风格版本，采用不同的视觉设计系统和配色方案
        </div>
        <span class="card-badge badge-vibe">设计版</span>
        <div class="status" style="color: #f59e0b;"><span class="status-dot" style="background: #f59e0b;"></span> 未运行 - 端口 5175</div>
      </a>
    </div>
  </div>
</body>
</html>
